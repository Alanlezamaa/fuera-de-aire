<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FGJ - Terminal Forense Digital</title>
<style>
  :root {
    --bg-dark: #0a0c10;
    --panel-dark: #141822;
    --cyber-blue: #00e5ff;
    --cyber-red: #ff3333;
    --cyber-amber: #ffb300;
    --text-gray: #8a99ad;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Courier New', monospace; }

  body {
    background-color: var(--bg-dark);
    color: #ffffff;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    background: linear-gradient(180deg, #10141e 0%, var(--bg-dark) 100%);
    border-bottom: 2px solid var(--cyber-blue);
    padding: 15px;
    text-align: center;
    box-shadow: 0 4px 15px rgba(0, 229, 255, 0.1);
  }

  .logo-area { font-size: 11px; color: var(--cyber-blue); font-weight: bold; letter-spacing: 2px; }
  .case-area { font-size: 13px; color: #fff; margin-top: 5px; font-weight: bold; }
  .access-badge {
    display: inline-block;
    margin-top: 8px;
    font-size: 9px;
    color: #39ff14;
    border: 1px solid #39ff14;
    padding: 3px 10px;
    border-radius: 3px;
    letter-spacing: 1px;
  }
  .status-pulse {
    display: inline-block; width: 8px; height: 8px; background: #39ff14; 
    border-radius: 50%; margin-right: 5px; animation: pulse 1.5s infinite;
  }

  @keyframes pulse { 0% { opacity: 0.3; } 50% { opacity: 1; } 100% { opacity: 0.3; } }

  main {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
  }

  .module-view { display: none; }

  #tab-audio:checked ~ main #view-audio,
  #tab-network:checked ~ main #view-network,
  #tab-decrypt:checked ~ main #view-decrypt { display: block; }

  input[type="radio"] { display: none; }

  .forensic-panel {
    background: var(--panel-dark);
    border: 1px solid #222c3c;
    border-left: 4px solid var(--cyber-blue);
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 4px;
  }

  .panel-title { font-size: 12px; color: var(--cyber-blue); margin-bottom: 10px; font-weight: bold; }
  .log-line { font-size: 11px; color: var(--text-gray); line-height: 1.5; margin-bottom: 6px; }
  .highlight { color: #fff; font-weight: bold; }

  nav {
    display: flex;
    background: #10141e;
    border-top: 1px solid #222c3c;
    height: 65px;
  }

  nav label {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    color: var(--text-gray);
    cursor: pointer;
    transition: all 0.3s;
    border-bottom: 3px solid transparent;
  }
